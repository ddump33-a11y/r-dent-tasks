<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a56db">
  <title>R-dent Tasks</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 id="manager-name">Loading...</h1>
      <div class="subtitle" id="manager-dept"></div>
      <div class="date-badge" id="date-badge"></div>
      <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text"></div>
    </header>

    <div class="task-section">
      <div class="section-title">Daily Tasks</div>
      <div id="daily-tasks"></div>
    </div>

    <div class="task-section">
      <div class="section-title">Weekly Tasks</div>
      <div id="weekly-tasks"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/manager.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
