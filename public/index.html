<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a56db">
  <title>R-dent Manager Tasks</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 id="manager-name">Loading...</h1>
      <div class="subtitle" id="manager-dept"></div>
      <div class="date-badge" id="date-badge"></div>
      <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text"></div>
    </header>

    <div class="task-section">
      <div class="section-title">Daily Tasks</div>
      <div id="daily-tasks"></div>
    </div>

    <div class="task-section">
      <div class="section-title">Weekly Tasks</div>
      <div id="weekly-tasks"></div>
    </div>

    <div class="task-section">
      <div class="section-title">Daily Notes</div>
      <div class="notes-card">
        <div class="notes-card-header">
          <span class="notes-hint">Type or use voice to add notes for today</span>
          <button class="mic-btn" id="mic-btn" onclick="toggleVoice()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
          </button>
        </div>
        <textarea id="daily-notes" class="daily-notes-textarea" placeholder="Any issues, updates, or things to flag for Daxton..." rows="4" oninput="handleNotesInput()"></textarea>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/manager.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
